<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YS89 發文管理系統</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230B0908'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='%23D4542A'>✦</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  background:#0B0908;
  color:#F5F1EB;
  min-height:100vh;
  position:relative
}
body::before{
  content:'';
  position:fixed;
  top:-80px;right:-80px;
  width:700px;height:700px;
  background:
    radial-gradient(circle at 60% 30%,
      rgba(160,45,12,.65) 0%,
      rgba(110,28,8,.35) 28%,
      rgba(60,14,4,.12) 55%,
      transparent 72%);
  filter:blur(28px);
  pointer-events:none;
  z-index:0
}
:root{
  --g1:#0f0d0b;--g2:#150e0b;--g3:#1c1208;--g4:#221408;
  --amber:#8B3214;--amber2:#A83A22;--amber3:#C44A2A;--amber4:#E07050;
  --accent:#D4542A;--accent2:#E87848;
  --border:#1e1410;--border2:#2e1e14;
  --text:#F5F1EB;--text2:#C9C2BA;--text3:#8A7D74
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0B0B0D}
::-webkit-scrollbar-thumb{background:#1e1410;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#2e1e14}

/* NAV */
nav{background:#0d0b0a;border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100;box-shadow:0 1px 20px #000a}
.nav-brand{color:var(--accent);font-weight:600;font-size:1.1rem;padding:15px 20px 15px 0;border-right:1px solid var(--border);margin-right:4px;letter-spacing:2px;font-family:'Cormorant Garamond',serif}
.nav-brand span{color:var(--text3);font-weight:400;font-size:.78rem;margin-left:6px;letter-spacing:.5px;font-family:'Inter',sans-serif}
.nav-tab{padding:13px 16px;cursor:pointer;color:var(--text3);font-size:.87rem;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* PAGE */
.page{display:none;padding:20px 24px;max-width:1440px;margin:0 auto}
.page.active{display:block}

/* CARD */
.card{background:var(--g1);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.card-sm{background:var(--g1);border:1px solid var(--border);border-radius:8px;padding:14px}
.card-title{font-size:.92rem;font-weight:600;color:var(--accent);margin-bottom:12px}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
@media(max-width:1000px){.g3,.g4,.g5{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.g2,.g3,.g4,.g5{grid-template-columns:1fr}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:.83rem;font-weight:500;transition:.15s;text-decoration:none}
.btn-primary{background:var(--amber);color:#F5F1EB}.btn-primary:hover{background:var(--amber2)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text3)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;border:none;color:var(--text3);cursor:pointer}.btn-ghost:hover{color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:.77rem;border-radius:5px}
.btn-xs{padding:3px 8px;font-size:.72rem;border-radius:4px}
.btn-copy{background:#1a0e08;color:var(--accent);border:1px solid var(--border2)}.btn-copy:hover{background:#221408}
.btn-danger{background:transparent;border:1px solid #3a1515;color:#f87171}.btn-danger:hover{background:#3a1515}

/* BADGE */
.badge{display:inline-flex;align-items:center;font-size:.72rem;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.b-green{background:#1a0e08;color:var(--accent)}
.b-green2{background:#221408;color:var(--amber4)}
.b-gray{background:#161412;color:var(--text3)}
.b-red{background:#2a1515;color:#f87171}
.b-yellow{background:#2a2210;color:#fbbf24}
.b-blue{background:#10182a;color:#60a5fa}
.b-warn{background:#2a1a0a;color:#fb923c}

/* FORMS */
input,select,textarea{background:#0d0b0a;border:1px solid var(--border);border-radius:7px;padding:7px 11px;color:var(--text);font-size:.86rem;width:100%;outline:none;transition:.2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:#0f0d0b}
textarea{resize:vertical;min-height:70px;line-height:1.6}
label{font-size:.78rem;color:var(--text3);display:block;margin-bottom:4px}
.fg{margin-bottom:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
select option{background:#0f0d0b}

/* PROMPT BOX */
.pbox{background:#0B0B0D;border:1px solid var(--border);border-radius:7px;padding:12px 40px 12px 12px;font-size:.8rem;line-height:1.7;color:#C9C2BA;position:relative;max-height:160px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;font-family:monospace}
.pcopy{position:absolute;top:6px;right:6px;padding:3px 9px;font-size:.72rem;background:#1a0e08;color:var(--accent);border:1px solid var(--border2);border-radius:4px;cursor:pointer}
.pcopy:hover{background:#221408}

/* STAT */
.stat{background:var(--g1);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.stat-num{font-size:1.8rem;font-weight:700;color:var(--accent);line-height:1.1}
.stat-label{font-size:.75rem;color:var(--text3);margin-top:5px}
.stat-sub{font-size:.75rem;color:var(--text3);margin-top:2px}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{background:#0d0b0a;color:var(--text3);font-weight:500;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #0f0d0b;color:var(--text2);vertical-align:middle}
tr:hover td{background:#0f0d0b}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:#000c;z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex}
.modal{background:#0d0b0a;border:1px solid var(--border2);border-radius:12px;padding:22px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
.modal-lg{max-width:760px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mt{font-size:.95rem;font-weight:600;color:var(--accent)}
.mc{background:none;border:none;color:var(--text3);font-size:1.2rem;cursor:pointer;line-height:1}.mc:hover{color:var(--text)}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:#1a0e08;border:1px solid var(--amber2);color:var(--accent);padding:10px 18px;border-radius:8px;font-size:.85rem;display:none;z-index:999;animation:fi .2s}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* COVERAGE BAR */
.cov-bar{height:6px;background:#161412;border-radius:3px;margin-top:5px;overflow:hidden}
.cov-fill{height:100%;border-radius:3px;transition:.4s;background:var(--accent)}
.cov-fill.warn{background:#fb923c}
.cov-fill.danger{background:#f87171}

/* PERSONA CARD */
.pcard{background:var(--g1);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;transition:.15s}
.pcard:hover{border-color:var(--border2)}
.pname{font-size:1rem;font-weight:700;color:var(--accent)}
.pdir{font-size:.78rem;color:var(--text3);margin-top:2px}
.sec{font-size:.72rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:11px 0 5px}

/* COMMUNITY CARD */
.ccard{background:var(--g1);border:1px solid var(--border);border-radius:10px;padding:16px}

/* COVERAGE GRID */
.cov-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.cov-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:.73rem;border:1px solid;white-space:nowrap}
.cov-chip.done{background:#1a0e08;border-color:var(--border2);color:var(--accent)}
.cov-chip.todo{background:#1a0e0e;border-color:#3a2020;color:#f87171}

/* SPARKLE */
.sparkle{
  position:fixed;
  top:68px;right:52px;
  font-size:52px;
  color:#F5F1EB;
  opacity:.92;
  pointer-events:none;
  z-index:50;
  line-height:1;
  text-shadow:
    0 0 18px rgba(255,255,255,.55),
    0 0 45px rgba(220,120,60,.35),
    0 0 90px rgba(180,60,20,.22)
}

/* MISC */
hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.flex{display:flex;align-items:center;gap:8px}
.fb{display:flex;align-items:center;justify-content:space-between}
.tm{color:var(--text3);font-size:.82rem}
.tg{color:var(--accent)}
.tr{color:#f87171}
.ty{color:#fbbf24}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">YS89<span>發文管理系統</span></div>
  <div id="sync-status" style="font-size:.72rem;color:var(--accent);margin-left:8px;opacity:.8"></div>
  <div class="nav-tab active" onclick="nav(this,'personas')">發文角色</div>
  <div class="nav-tab" onclick="nav(this,'tracker')">發文追蹤</div>
  <div class="nav-tab" onclick="nav(this,'articles')">文章庫</div>
  <div class="nav-tab" onclick="nav(this,'community')">社群號</div>
  <div class="nav-tab" onclick="nav(this,'threads')">📱 Threads</div>
</nav>

<div id="toast"></div>
<div class="sparkle">✦</div>

<!-- ===== PAGE: 發文角色 ===== -->
<div id="pg-personas" class="page active">
  <div class="fb" style="margin-bottom:18px">
    <div>
      <h2 style="font-size:1.2rem;font-weight:700">發文角色</h2>
      <p class="tm" style="margin-top:3px">管理每個發文帳號的人設、提示詞、發文記錄</p>
    </div>
    <div class="flex">
      <select id="filter-dir" onchange="renderPersonas()" style="width:160px">
        <option value="">全部方向</option>
        <option>世足/運彩</option><option>金流/USDT</option><option>安全/法律</option>
        <option>百家樂</option><option>老虎機</option><option>捕魚機</option><option>通用</option>
      </select>
      <button class="btn btn-primary" onclick="openModal('modal-add-persona')">+ 新增角色</button>
    </div>
  </div>
  <div id="personas-grid" class="g2"></div>
</div>

<!-- ===== PAGE: 發文追蹤 ===== -->
<div id="pg-tracker" class="page">
  <div class="fb" style="margin-bottom:18px">
    <div>
      <h2 style="font-size:1.2rem;font-weight:700">發文追蹤</h2>
      <p class="tm" style="margin-top:3px">記錄每次發文的來源文章、流量數據</p>
    </div>
    <button class="btn btn-primary" onclick="openAddPostModal()">+ 新增發文記錄</button>
  </div>
  <div class="g4" style="margin-bottom:18px" id="t-stats"></div>
  <div class="card">
    <div class="fb" style="margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">發文記錄</div>
      <div class="flex">
        <select id="tf-persona" style="width:120px" onchange="renderPosts()"><option value="">全部角色</option></select>
        <select id="tf-platform" style="width:100px" onchange="renderPosts()"><option value="">全部平台</option><option>IG</option><option>FB</option><option>IG+FB</option></select>
      </div>
    </div>
    <div id="posts-table"></div>
  </div>
</div>

<!-- ===== PAGE: 文章庫 ===== -->
<div id="pg-articles" class="page">
  <div class="fb" style="margin-bottom:18px">
    <div>
      <h2 style="font-size:1.2rem;font-weight:700">文章庫</h2>
      <p class="tm" style="margin-top:3px">追蹤每篇文章各方向帳號的發布覆蓋率，確保同方向帳號都發過</p>
    </div>
    <button class="btn btn-primary" onclick="openAddArticleModal()">+ 新增文章</button>
  </div>
  <div class="g4" id="art-stats" style="margin-bottom:18px"></div>
  <div id="art-list"></div>
</div>

<!-- ===== PAGE: 社群號 ===== -->
<div id="pg-community" class="page">
  <div class="fb" style="margin-bottom:18px">
    <div>
      <h2 style="font-size:1.2rem;font-weight:700">社群號</h2>
      <p class="tm" style="margin-top:3px">回覆帳號管理 · 人設語氣設定（部分尚未建立）</p>
    </div>
    <button class="btn btn-primary" onclick="openAddCommunityModal()">+ 新增帳號</button>
  </div>
  <div id="cm-grid" class="g3"></div>
</div>

<!-- ===== PAGE: Threads 腳本 ===== -->
<div id="pg-threads" class="page">
  <div class="fb" style="margin-bottom:18px">
    <div>
      <h2 style="font-size:1.2rem;font-weight:700">Threads 腳本庫</h2>
      <p class="tm" style="margin-top:3px">熱門仿文腳本 · 角色炒話題回覆規劃</p>
    </div>
    <select id="th-dir-filter" onchange="renderThreads()" style="width:160px">
      <option value="">全部方向</option>
      <option>世足/運彩</option><option>金流/USDT</option><option>安全/法律</option>
      <option>百家樂</option><option>老虎機</option><option>捕魚機</option>
    </select>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">
    <div>
      <div class="fb" style="margin-bottom:12px">
        <div style="font-size:.9rem;font-weight:600;color:var(--accent)">✍️ 仿文腳本</div>
        <button class="btn btn-primary btn-sm" onclick="openAddThreadsPost()">+ 新增</button>
      </div>
      <div id="th-posts-list"></div>
    </div>
    <div>
      <div class="fb" style="margin-bottom:12px">
        <div style="font-size:.9rem;font-weight:600;color:var(--accent)">🔥 炒話題回覆串</div>
        <button class="btn btn-primary btn-sm" onclick="openAddThreadsReply()">+ 新增</button>
      </div>
      <div id="th-replies-list"></div>
    </div>
  </div>
</div>

<!-- ============ MODALS ============ -->

<!-- 角色詳情 -->
<div id="modal-persona-detail" class="overlay">
  <div class="modal modal-lg">
    <div class="mh"><div class="mt" id="pd-title"></div><button class="mc" onclick="closeModal('modal-persona-detail')">✕</button></div>
    <div id="pd-body"></div>
  </div>
</div>

<!-- 新增/編輯角色 -->
<div id="modal-add-persona" class="overlay">
  <div class="modal">
    <div class="mh"><div class="mt" id="ap-title">新增發文角色</div><button class="mc" onclick="closeModal('modal-add-persona')">✕</button></div>
    <input type="hidden" id="ap-id">
    <div class="fr"><div class="fg"><label>角色名稱</label><input id="ap-name" placeholder="例：Mark"></div>
    <div class="fg"><label>粉絲數</label><input type="number" id="ap-followers" placeholder="0"></div></div>
    <div class="fr"><div class="fg"><label>發布方向</label>
      <select id="ap-dir"><option>世足/運彩</option><option>金流/USDT</option><option>安全/法律</option><option>百家樂</option><option>老虎機</option><option>捕魚機</option><option>通用</option></select>
    </div>
    <div class="fg"><label>發布主題</label><input id="ap-direction" placeholder="例：出金/USDT/流水"></div></div>
    <div class="fg"><label>核心氣質</label><input id="ap-essence" placeholder="例：書呆子感、專注、安靜"></div>
    <div class="fg"><label>語氣風格</label><textarea id="ap-tone" rows="2" placeholder="描述語氣與寫作風格"></textarea></div>
    <div class="fg"><label>適合主題</label><textarea id="ap-topics" rows="2"></textarea></div>
    <div class="fg"><label>禁忌用詞</label><textarea id="ap-forbidden" rows="2" placeholder="不能出現的詞彙"></textarea></div>
    <div class="fg"><label>角色定位提示詞</label><textarea id="ap-role" rows="4" placeholder="完整角色定位提示詞"></textarea></div>
    <div class="fg"><label>圖文生圖提示詞</label><textarea id="ap-img" rows="5" placeholder="生圖用完整英文提示詞"></textarea></div>
    <div class="fb" style="margin-top:6px">
      <button class="btn btn-outline" onclick="closeModal('modal-add-persona')">取消</button>
      <button class="btn btn-primary" id="ap-save-btn" onclick="savePersona()">儲存角色</button>
    </div>
  </div>
</div>

<!-- 記錄文案 -->
<div id="modal-log-prompt" class="overlay">
  <div class="modal">
    <div class="mh"><div class="mt" id="lp-title">記錄發文文案</div><button class="mc" onclick="closeModal('modal-log-prompt')">✕</button></div>
    <input type="hidden" id="lp-pid">
    <div class="fg"><label>本次使用的文案提示詞</label><textarea id="lp-prompt" rows="6" placeholder="記錄此次改寫使用的提示詞、指令內容"></textarea></div>
    <div class="fg"><label>備註（可選）</label><input id="lp-note" placeholder="例：引用ART-003，重點提煉世足賠率分析"></div>
    <div class="fb" style="margin-top:6px">
      <button class="btn btn-outline" onclick="closeModal('modal-log-prompt')">取消</button>
      <button class="btn btn-primary" onclick="savePromptLog()">儲存記錄</button>
    </div>
  </div>
</div>

<!-- 新增發文記錄 -->
<div id="modal-add-post" class="overlay">
  <div class="modal">
    <div class="mh"><div class="mt">新增發文記錄</div><button class="mc" onclick="closeModal('modal-add-post')">✕</button></div>
    <div class="fr">
      <div class="fg"><label>發文日期</label><input type="date" id="po-date"></div>
      <div class="fg"><label>發文角色</label><select id="po-persona"><option value="">選擇角色</option></select></div>
    </div>
    <div class="fr">
      <div class="fg"><label>平台</label><select id="po-platform"><option>IG</option><option>FB</option><option>IG+FB</option></select></div>
      <div class="fg"><label>引用文章</label><select id="po-article"><option value="">選擇文章</option></select></div>
    </div>
    <div class="fg"><label>主題摘要</label><input id="po-topic" placeholder="例：USDT走勢分析"></div>
    <hr>
    <div class="tm" style="margin-bottom:10px">流量數據（發文後填入）</div>
    <div class="fr">
      <div class="fg"><label>按讚</label><input type="number" id="po-likes" placeholder="0"></div>
      <div class="fg"><label>留言</label><input type="number" id="po-comments" placeholder="0"></div>
    </div>
    <div class="fr">
      <div class="fg"><label>分享</label><input type="number" id="po-shares" placeholder="0"></div>
      <div class="fg"><label>觸及</label><input type="number" id="po-reach" placeholder="0"></div>
    </div>
    <div class="fb" style="margin-top:6px">
      <button class="btn btn-outline" onclick="closeModal('modal-add-post')">取消</button>
      <button class="btn btn-primary" onclick="savePost()">儲存記錄</button>
    </div>
  </div>
</div>

<!-- 更新流量 -->
<div id="modal-metrics" class="overlay">
  <div class="modal" style="max-width:400px">
    <div class="mh"><div class="mt">更新流量數據</div><button class="mc" onclick="closeModal('modal-metrics')">✕</button></div>
    <input type="hidden" id="um-id">
    <div class="fr"><div class="fg"><label>瀏覽次數</label><input type="number" id="um-views"></div><div class="fg"><label>已觸及帳號</label><input type="number" id="um-reach"></div></div>
    <div class="fr"><div class="fg"><label>按讚</label><input type="number" id="um-likes"></div><div class="fg"><label>留言</label><input type="number" id="um-comments"></div></div>
    <div class="fr"><div class="fg"><label>儲存</label><input type="number" id="um-saves"></div><div class="fg"><label>分享</label><input type="number" id="um-shares"></div></div>
    <div class="fb" style="margin-top:6px">
      <button class="btn btn-outline" onclick="closeModal('modal-metrics')">取消</button>
      <button class="btn btn-primary" onclick="updateMetrics()">更新</button>
    </div>
  </div>
</div>

<!-- 新增文章 -->
<div id="modal-add-article" class="overlay">
  <div class="modal">

// ===== DB =====
const K='ys89_'
const API='https://ys89-api.ysyyds0001.workers.dev'
const DB={
  get(k){try{return JSON.parse(localStorage.getItem(K+k)||'[]')}catch{return[]}},
  set(k,v){
    localStorage.setItem(K+k,JSON.stringify(v))
    fetch(API+'/api/'+k,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(v)})
      .catch(()=>{})
  },
  async pull(k){
    try{
      const r=await fetch(API+'/api/'+k)
      if(r.ok){const d=await r.json();localStorage.setItem(K+k,JSON.stringify(d));return d}
    }catch(e){}
    return this.get(k)
  },
  id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
}

async function initData(){
  const sync=document.getElementById('sync-status')
  if(sync) sync.textContent='同步中…'
  try{
    await Promise.all(['personas','articles','posts','community','threads_posts','threads_replies'].map(k=>DB.pull(k)))
    if(!DB.get('personas').length) DB.set('personas',DEFAULT_PERSONAS)
    if(!DB.get('community').length) DB.set('community',DEFAULT_COMMUNITY)
    if(sync) sync.textContent='已同步'
    setTimeout(()=>{if(sync)sync.textContent=''},2000)
  }catch(e){
    if(!DB.get('personas').length) DB.set('personas',DEFAULT_PERSONAS)
    if(!DB.get('community').length) DB.set('community',DEFAULT_COMMUNITY)
    if(sync){sync.textContent='離線模式';sync.style.color='#fb923c'}
  }
}

function nav(el,page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'))
  document.getElementById('pg-'+page).classList.add('active')
  el.classList.add('active')
  const renders={personas:renderPersonas,tracker:renderTracker,articles:renderArticles,community:renderCommunity,threads:renderThreads}
  renders[page]&&renders[page]()
}
function openModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('show')}))
function toast(msg,type='ok'){
  const t=document.getElementById('toast')
  t.textContent=msg
  t.style.borderColor=type==='warn'?'#fb923c':type==='err'?'#f87171':'var(--green2)'
  t.style.color=type==='warn'?'#fb923c':type==='err'?'#f87171':'var(--accent)'
  t.style.display='block'
  clearTimeout(t._timer)
  t._timer=setTimeout(()=>t.style.display='none',2200)
}
function cp(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    if(btn){const o=btn.textContent;btn.textContent='已複製!';setTimeout(()=>btn.textContent=o,1500)}
    else toast('已複製到剪貼簿')
  })
}

function savePost(){
  const pid=document.getElementById('po-persona').value
  const aid=document.getElementById('po-article').value
  const personas=DB.get('personas')
  const p=personas.find(x=>x.id===pid)
  const articles=DB.get('articles')
  const a=articles.find(x=>x.id===aid)
  if(a){
    const ai=articles.findIndex(x=>x.id===aid)
    if(!articles[ai].postedBy)articles[ai].postedBy=[]
    if(p&&!articles[ai].postedBy.find(x=>x.pid===pid)){
      articles[ai].postedBy.push({pid,name:p.name,date:document.getElementById('po-date').value})
    }
    articles[ai].lastUsed=new Date().toISOString()
    DB.set('articles',articles)

  const posts=DB.get('posts')
  posts.push({
    id:DB.id(),date:document.getElementById('po-date').value,
    personaId:pid,personaName:p?.name||'',
    platform:document.getElementById('po-platform').value,

function delPost(id){
  if(!confirm('確定刪除這筆發文記錄？\n（文章庫的覆蓋狀態也會同步移除）'))return
  const posts=DB.get('posts')
  const post=posts.find(x=>x.id===id); if(!post)return
  DB.set('posts',posts.filter(x=>x.id!==id))
  // 同步移除文章庫的覆蓋記錄
  if(post.articleId&&post.personaId){
    const articles=DB.get('articles')
    const ai=articles.findIndex(a=>a.id===post.articleId)
    if(ai>=0){
      articles[ai].postedBy=(articles[ai].postedBy||[]).filter(x=>x.pid!==post.personaId)
      DB.set('articles',articles)
    }
  }
  renderPosts()
  toast('已刪除')
}

function renderArticles(){
  const articles=DB.get('articles')
  const personas=DB.get('personas')
  const total=articles.length
  const fullCov=articles.filter(a=>{
    const dir=a.dir; if(!dir)return false
    const needed=personas.filter(p=>p.dir===dir)
    if(!needed.length)return false
    const done=(a.postedBy||[]).map(x=>x.pid)
    return needed.every(p=>done.includes(p.id))
  }).length
  document.getElementById('art-stats').innerHTML=[
    ['文章總數',total,''],
    ['完整覆蓋',fullCov,'tg'],
    ['待補發',total-fullCov,'ty'],
    ['無帳號方向',articles.filter(a=>!personas.some(p=>p.dir===a.dir)).length,'tm']
  ].map(([l,v,c])=>`<div class="stat"><div class="stat-num ${c||''}">${v}</div><div class="stat-label">${l}</div></div>`).join('')

  const wrap=document.getElementById('art-list')
  if(!articles.length){wrap.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--text3)">尚無文章，點擊右上角新增</div>';return}
  wrap.innerHTML=articles.slice().reverse().map(a=>{
    const needed=personas.filter(p=>p.dir===a.dir)
    const done=(a.postedBy||[]).map(x=>x.pid)
    const doneNames=(a.postedBy||[]).map(x=>x.name)
    const todoList=needed.filter(p=>!done.includes(p.id))
    const doneList=needed.filter(p=>done.includes(p.id))
    const covPct=needed.length?Math.round(doneList.length/needed.length*100):0
    const covColor=covPct===100?'':covPct>=50?'warn':'danger'
    return`<div class="card" style="margin-bottom:12px">
      <div class="fb" style="margin-bottom:10px">
        <div>
          <div style="font-weight:600;color:var(--text);font-size:.93rem">${a.title}</div>
          <div class="flex" style="margin-top:4px;flex-wrap:wrap;gap:5px">
            <span class="badge b-gray">${a.dir||'未分類'}</span>
            <span class="badge b-blue">${a.source||'ys89論壇'}</span>
            ${a.date?`<span class="tm">${a.date}</span>`:''}
            ${a.url?`<a href="${a.url}" target="_blank" class="badge b-green2" style="text-decoration:none">查看原文</a>`:''}
          </div>
        </div>
        <div class="flex">
          <div style="text-align:right">
            <div style="font-size:1.1rem;font-weight:700;color:${covPct===100?'var(--accent)':covPct>=50?'#fbbf24':'#f87171'}">${covPct}%</div>
            <div class="tm">覆蓋率</div>
          </div>
          <button class="btn btn-xs btn-danger" onclick="delArticle('${a.id}')">刪除</button>
        </div>
      </div>
      ${needed.length?`
      <div class="cov-bar"><div class="cov-fill ${covColor}" style="width:${covPct}%"></div></div>
      <div class="fb" style="margin-top:8px;flex-wrap:wrap;gap:8px">
        <div>
          ${doneList.length?`<div class="tm" style="margin-bottom:4px">已發布 (${doneList.length}/${needed.length})</div>
          <div class="cov-grid">${doneList.map(p=>`<span class="cov-chip done">✓ ${p.name}</span>`).join('')}</div>`:''}
          ${todoList.length?`<div class="tm" style="margin:6px 0 4px">待發布 (${todoList.length})</div>
          <div class="cov-grid">${todoList.map(p=>`<span class="cov-chip todo">✗ ${p.name}</span>`).join('')}</div>`:''}
        </div>
      </div>`:`<div class="tm">方向「${a.dir||'未分類'}」尚無發文帳號</div>`}
      ${a.summary?`<div class="tm" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.6">${a.summary}</div>`:''}
    </div>`
  }).join('')

// ===== THREADS SCRIPTS =====
const ST_BADGE={草稿:'b-gray',備用:'b-yellow',已發布:'b-green',進行中:'b-warn',已完成:'b-green',已回覆:'b-green'}
const STG_BADGE={帶風向:'b-red','引流/導到ys89':'b-green',炒話題:'b-warn',真人互動:'b-blue'}

function renderThreads(){
  renderThreadsPosts()
  renderThreadsReplies()
}

function renderThreadsPosts(){
  const all=DB.get('threads_posts')
  const dir=document.getElementById('th-dir-filter')?.value
  const list=dir?all.filter(p=>p.dir===dir):all
  const wrap=document.getElementById('th-posts-list')
  if(!list.length){wrap.innerHTML='<div class="card" style="text-align:center;padding:30px;color:var(--text3)">尚無仿文腳本<br><span style="font-size:.78rem">點右上角「+ 新增」開始建立</span></div>';return}
  wrap.innerHTML=list.slice().reverse().map(p=>`
    <div class="card" style="margin-bottom:10px">
      <div class="fb" style="margin-bottom:8px">
        <div class="flex" style="flex-wrap:wrap;gap:5px">
          <span class="badge b-gray">${p.dir}</span>
          ${p.personaName?`<span class="badge b-green">${p.personaName}</span>`:''}
          <span class="badge ${ST_BADGE[p.status]||'b-gray'}">${p.status}</span>
        </div>
        <div class="flex">
          <button class="btn btn-xs btn-outline" onclick="openEditThreadsPost('${p.id}')">編輯</button>
          <button class="btn btn-xs btn-danger" onclick="delThreadsPost('${p.id}')">刪</button>
        </div>
      </div>
      ${p.refSummary?`<div class="tm" style="margin-bottom:6px;font-size:.78rem">📎 ${p.refSummary.slice(0,60)}${p.refSummary.length>60?'…':''}</div>`:''}
      ${p.refUrl?`<div style="margin-bottom:7px"><a href="${p.refUrl}" target="_blank" class="badge b-blue" style="text-decoration:none;font-size:.72rem">查看原帖 ↗</a></div>`:''}
      <div style="background:#0B0B0D;border:1px solid var(--border);border-radius:7px;padding:10px 38px 10px 10px;font-size:.82rem;line-height:1.7;color:var(--text2);position:relative;white-space:pre-wrap;max-height:130px;overflow-y:auto">
        ${p.script||'（尚無腳本）'}
        ${p.script?`<button class="pcopy" onclick="cp(${JSON.stringify(p.script)},this)" style="top:5px;right:5px">複製</button>`:''}
      </div>
      ${p.note?`<div class="tm" style="margin-top:6px;font-size:.77rem">📌 ${p.note}</div>`:''}
    </div>`).join('')
}

function renderThreadsReplies(){
  const all=DB.get('threads_replies')
  const dir=document.getElementById('th-dir-filter')?.value
  const list=dir?all.filter(c=>c.dir===dir):all
  const wrap=document.getElementById('th-replies-list')
  if(!list.length){wrap.innerHTML='<div class="card" style="text-align:center;padding:30px;color:var(--text3)">尚無回覆串<br><span style="font-size:.78rem">點右上角「+ 新增」建立炒話題計畫</span></div>';return}
  wrap.innerHTML=list.slice().reverse().map(c=>`
    <div class="card" style="margin-bottom:10px">
      <div class="fb" style="margin-bottom:8px">
        <div class="flex" style="flex-wrap:wrap;gap:5px">
          <span class="badge ${STG_BADGE[c.strategy]||'b-gray'}">${c.strategy}</span>
          <span class="badge b-gray">${c.dir}</span>
          <span class="badge ${ST_BADGE[c.status]||'b-gray'}">${c.status}</span>
        </div>
        <div class="flex">
          <button class="btn btn-xs btn-outline" onclick="openEditThreadsReply('${c.id}')">編輯</button>
          <button class="btn btn-xs btn-danger" onclick="delThreadsReply('${c.id}')">刪</button>
        </div>
      </div>
      <div style="font-size:.85rem;color:var(--text);margin-bottom:6px">${c.summary||'（無說明）'}</div>
      ${c.threadUrl?`<div style="margin-bottom:8px"><a href="${c.threadUrl}" target="_blank" class="badge b-blue" style="text-decoration:none;font-size:.72rem">查看討論串 ↗</a></div>`:''}
      <div style="margin-top:4px">
        ${(c.replies||[]).map(r=>`
          <div style="background:#0B0B0D;border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:6px">
            <div class="fb" style="margin-bottom:5px">
              <div class="flex" style="gap:5px">
                <span class="badge b-green" style="font-size:.7rem">${r.personaName}</span>
                <span class="badge ${ST_BADGE[r.status]||'b-gray'}" style="font-size:.7rem">${r.status}</span>
              </div>
              <div class="flex" style="gap:4px">
                ${r.script?`<button class="btn btn-xs btn-copy" onclick="cp(${JSON.stringify(r.script)},this)">複製</button>`:''}
                <button class="btn btn-xs btn-outline" onclick="openEditReplyScript('${c.id}','${r.id}')">編輯</button>
                <button class="btn btn-xs btn-danger" onclick="delReplyScript('${c.id}','${r.id}')">刪</button>
              </div>
            </div>
            <div style="font-size:.8rem;color:var(--text2);white-space:pre-wrap;line-height:1.6;max-height:80px;overflow-y:auto">${r.script||'（尚無腳本）'}</div>
          </div>`).join('')}
        <button class="btn btn-xs btn-outline" style="width:100%;margin-top:2px" onclick="openAddReplyScript('${c.id}')">+ 新增角色回覆</button>
      </div>
    </div>`).join('')
}

function openEditThreadsPost(id){
  const p=DB.get('threads_posts').find(x=>x.id===id);if(!p)return
  document.getElementById('tp-id').value=id
  document.getElementById('tp-title').textContent='編輯仿文腳本'
  document.getElementById('tp-dir').value=p.dir||'世足/運彩'
  const personas=DB.get('personas')
  document.getElementById('tp-persona').innerHTML='<option value="">不指定</option>'+personas.map(pe=>`<option value="${pe.id}"${pe.id===p.personaId?' selected':''}>${pe.name}</option>`).join('')
  ;['tp-ref-url','tp-ref-summary','tp-script','tp-note'].forEach(i=>document.getElementById(i).value=p[i.replace('tp-','').replace(/-([a-z])/g,(_,c)=>c.toUpperCase())]||'')
  document.getElementById('tp-ref-url').value=p.refUrl||''
  document.getElementById('tp-ref-summary').value=p.refSummary||''
  document.getElementById('tp-script').value=p.script||''
  document.getElementById('tp-note').value=p.note||''
  document.getElementById('tp-status').value=p.status||'草稿'
  openModal('modal-threads-post')
}

function saveThreadsPost(){
  const id=document.getElementById('tp-id').value
  const script=document.getElementById('tp-script').value.trim()
  if(!script){toast('請填入仿寫腳本','err');return}
  const personas=DB.get('personas')
  const pid=document.getElementById('tp-persona').value
  const persona=personas.find(p=>p.id===pid)
  const posts=DB.get('threads_posts')
  const obj={
    dir:document.getElementById('tp-dir').value,
    personaId:pid||'',personaName:persona?.name||'',
    refUrl:document.getElementById('tp-ref-url').value,
    refSummary:document.getElementById('tp-ref-summary').value,
    script,note:document.getElementById('tp-note').value,
    status:document.getElementById('tp-status').value,
  }
  if(id){const i=posts.findIndex(x=>x.id===id);if(i>=0)posts[i]={...posts[i],...obj}}
  else posts.push({...obj,id:DB.id(),createdAt:new Date().toISOString()})
  DB.set('threads_posts',posts)
  closeModal('modal-threads-post')
  renderThreadsPosts()
  toast(id?'腳本已更新':'腳本已新增')
}

function delThreadsPost(id){
  if(!confirm('確定刪除此腳本？'))return
  DB.set('threads_posts',DB.get('threads_posts').filter(x=>x.id!==id))
  renderThreadsPosts()
  toast('已刪除')
}

function openAddReplyScript(campaignId){
  document.getElementById('tar-campaign-id').value=campaignId
  document.getElementById('tar-reply-id').value=''
  document.getElementById('tar-title').textContent='新增角色回覆'
  document.getElementById('tar-script').value=''
  document.getElementById('tar-status').value='草稿'
  const personas=DB.get('personas')
  document.getElementById('tar-persona').innerHTML='<option value="">選擇角色</option>'+personas.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')
  openModal('modal-threads-add-reply')
}

function openEditReplyScript(campaignId,replyId){
  const c=DB.get('threads_replies').find(x=>x.id===campaignId);if(!c)return
  const r=(c.replies||[]).find(x=>x.id===replyId);if(!r)return
  document.getElementById('tar-campaign-id').value=campaignId
  document.getElementById('tar-reply-id').value=replyId
  document.getElementById('tar-title').textContent='編輯角色回覆'
  document.getElementById('tar-script').value=r.script||''
  document.getElementById('tar-status').value=r.status||'草稿'
  const personas=DB.get('personas')
  document.getElementById('tar-persona').innerHTML='<option value="">選擇角色</option>'+personas.map(p=>`<option value="${p.id}"${p.id===r.personaId?' selected':''}>${p.name}</option>`).join('')
  openModal('modal-threads-add-reply')
}

function saveReplyScript(){
  const campaignId=document.getElementById('tar-campaign-id').value
  const replyId=document.getElementById('tar-reply-id').value
  const pid=document.getElementById('tar-persona').value
  if(!pid){toast('請選擇角色','err');return}
  const personas=DB.get('personas')
  const persona=personas.find(p=>p.id===pid)
  const campaigns=DB.get('threads_replies')
  const ci=campaigns.findIndex(x=>x.id===campaignId);if(ci<0)return
  if(!campaigns[ci].replies)campaigns[ci].replies=[]
  const obj={personaId:pid,personaName:persona?.name||pid,script:document.getElementById('tar-script').value.trim(),status:document.getElementById('tar-status').value}
  if(replyId){
    const ri=campaigns[ci].replies.findIndex(x=>x.id===replyId)
    if(ri>=0)campaigns[ci].replies[ri]={...campaigns[ci].replies[ri],...obj}
  }else{
    campaigns[ci].replies.push({...obj,id:DB.id(),createdAt:new Date().toISOString()})
  }
  DB.set('threads_replies',campaigns)
  closeModal('modal-threads-add-reply')
  renderThreadsReplies()
  toast('回覆腳本已儲存')
}

function delReplyScript(campaignId,replyId){
  if(!confirm('確定刪除此回覆腳本？'))return
  const campaigns=DB.get('threads_replies')
  const ci=campaigns.findIndex(x=>x.id===campaignId);if(ci<0)return
  campaigns[ci].replies=(campaigns[ci].replies||[]).filter(x=>x.id!==replyId)
  DB.set('threads_replies',campaigns)
  renderThreadsReplies()
  toast('已刪除')
}
